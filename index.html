<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Knights Travalis</title>
		<style>
		* {
			box-sizing: border-box;
		}
		body {
			padding: 1rem;
			font-family:
				system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
				Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
		}
		kbd,
		code {
			color: #dd00dd;
			background-color: #ffddff;
			padding-block: 2px;
			padding-inline: 4px;
			border-radius: 4px;
		}
		</style>
	</head>
	<body>
		<main>
			<h1>Knight Moves!</h1>
			<h3>Open console to play. <kbd>F11</kbd></h3>
			<p>
				Use <code>knightMoves(start, end)</code> to play where start and end are
				both in the form of [x,y] pairs
			</p>
			<p>Example: <code>knightMoves([2, 4], [0, 0])</code></p>
		</main>
		<script src="./src/index.js"></script>
	</body>
</html>
