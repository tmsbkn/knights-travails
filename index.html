<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Knights Travalis</title>
		<style>
		* {
			box-sizing: border-box;
		}
		body {
			padding: 1rem;
			font-family:
				system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
				Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
		}
		main {
			max-width: 800px;
			margin: auto;
		}
		kbd,
		code {
			color: #dd00dd;
			background-color: #ffddff;
			padding-block: 2px;
			padding-inline: 4px;
			border-radius: 4px;
		}
		form {
			padding: 1rem;
			background-color: #ddd;
			display: inline-grid;
			gap: 0.5rem;
			grid-template-columns: 1fr 1fr;
		}
		.inputGroup {
			display: flex;
			flex-direction: column;
			border: 1px gray solid;
		}
		.inputTitle {
			font-weight: 600;
			padding-bottom: 0.5rem;
		}
		input[type="submit"] {
			grid-column: span 2;
			justify-self: center;
			width: min-content;
		}
		</style>
	</head>
	<body>
		<main>
			<h1>Knight Moves!</h1>
			<h3>Open console to play. <kbd>F11</kbd></h3>
			<form id="form">
				<div class="inputGroup" id="fromInputs">
					<span class="inputTitle">Starting Coordinates</span>
					<div class="inputField">
						<label for="fromX">'X':</label>
						<input required type="number" min="0" max="7" value="6" id="fromX">
					</div>
					<div class="inputField">
						<label for="fromY">'Y':</label>
						<input required type="number" min="0" max="7" value="7" id="fromY">
					</div>
				</div>
				<div class="inputGroup" id="toInputs">
					<span class="inputTitle">Target Coordinates</span>
					<div class="inputField">
						<label for="toX">'X': </label>
						<input required type="number" min="0" max="7" value="2" id="toX">
					</div>
					<div class="inputField">
						<label for="toY">'Y': </label>
						<input required type="number" min="0" max="7" value="1" id="toY">
					</div>
				</div>
				<input type="submit" value="Move!" id="submitButton">
			</form>
			<p>
				Use <code>knightMoves(start, end)</code> to play where start and end are
				both in the form of [x,y] pairs
			</p>
			<p>Example: <code>knightMoves([2, 4], [0, 0])</code></p>
		</main>
		<script src="./src/index.js"></script>
	</body>
</html>
